name: ai-chat
port: 8080
install: |
  pip install --break-system-packages fastapi uvicorn pydantic httpx
start: uvicorn chat:app --host 0.0.0.0 --port 8080
health:
  path: /healthz
  timeoutSeconds: 30
ai:
  managed: true
params:
  - key: model
    type: select
    label: Model alias
    description: Portable model alias resolved by the managed AI proxy.
    group: AI
    default: rigbox/default
    envVar: MODEL
    options:
      - { value: rigbox/default, label: "Default" }
      - { value: rigbox/fast, label: "Fast" }
      - { value: rigbox/free, label: "Free" }
