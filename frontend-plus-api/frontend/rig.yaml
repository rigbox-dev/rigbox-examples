# Frontend of the frontend-plus-api composition. Serves a tiny todo
# UI on port 5101 that calls the sibling `fpa-api` app via the URL
# injected as `RIGBOX_API_URL` at install time.

name: fpa-web
port: 5101
start: node server.js
install: |
  set -e
  # Composition installs trigger a fresh `git clone` per child app via
  # source.kind=git below. Promote frontend/ to the working dir so
  # server.js + public/ sit where the systemd unit expects.
  if [ -d frontend-plus-api/frontend ]; then
    cp -r frontend-plus-api/frontend/. .
    rm -rf frontend-plus-api
  fi
  command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5101"

source:
  kind: git
  repo: https://github.com/rigbox-dev/rigbox-examples.git

params:
  - key: api_url
    type: url
    label: API base URL
    description: |
      Where the frontend will send /api/todos requests. The
      composition sets this to the sibling fpa-api app's public
      subdomain so the static page can talk cross-origin.
    group: Wiring
    default: ""
    envVar: RIGBOX_API_URL

health:
  path: /healthz
  timeoutSeconds: 30

recipe:
  vendor: rigbox
  slug: fpa-web
  version: 0.1.0
  summary: Static frontend for the frontend-plus-api composition.
  description: |
    Tiny todo UI in vanilla HTML/JS. The composition wires
    `api_url` to the sibling fpa-api app's subdomain so the page
    knows where the backend lives.
  category: starter
  tags:
    - composition
    - frontend
