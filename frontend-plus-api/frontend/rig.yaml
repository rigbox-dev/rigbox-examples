# Frontend of the frontend-plus-api composition. Serves a tiny todo
# UI on port 5101 that calls the sibling `fpa-api` app via the URL
# injected as `RIGBOX_API_URL` at install time.

name: fpa-web
port: 5101
start: node server.js
install: command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5101"

params:
  - key: api_url
    type: url
    label: API base URL
    description: |
      Where the frontend will send /api/todos requests. The
      composition sets this to the sibling fpa-api app's public
      subdomain so the static page can talk cross-origin.
    group: Wiring
    default: ""
    envVar: RIGBOX_API_URL

health:
  path: /healthz
  timeoutSeconds: 30

recipe:
  vendor: jonathan
  slug: fpa-web
  version: 0.1.0
  summary: Static frontend for the frontend-plus-api composition.
  description: |
    Tiny todo UI in vanilla HTML/JS. The composition wires
    `api_url` to the sibling fpa-api app's subdomain so the page
    knows where the backend lives.
  category: starter
  tags:
    - composition
    - frontend
