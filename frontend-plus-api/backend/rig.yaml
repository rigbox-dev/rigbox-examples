# Backend of the frontend-plus-api composition. Tiny in-memory todo
# API on port 5100. The sibling frontend talks to this app's
# subdomain — see the composition.yaml at the parent directory for
# how they get wired together.

name: fpa-api
port: 5100
start: node app.js
install: |
  set -e
  # Composition installs trigger a fresh `git clone` per child app
  # via source.kind=git below. After clone, promote our backend dir
  # up to the working-dir root so app.js sits where the systemd unit
  # expects.
  if [ -d frontend-plus-api/backend ]; then
    cp -r frontend-plus-api/backend/. .
    rm -rf frontend-plus-api
  fi
  command -v node >/dev/null || sudo apt-get install -y nodejs

# Cloning the public examples repo at install time keeps this recipe
# self-contained — composition deploys can install it onto any
# workspace without rsync from the operator.
source:
  kind: git
  repo: https://github.com/rigbox-dev/rigbox-examples.git

params:
  - key: enable_metrics
    type: boolean
    label: Expose Prometheus metrics
    description: When true, /metrics returns a single todos_total gauge.
    group: Observability
    default: "false"
    envVar: ENABLE_METRICS

health:
  path: /healthz
  timeoutSeconds: 30
