# Local-iteration composition — same two apps as ../composition.yaml,
# but each child points at a sibling path under this repo so
# `rig workspace deploy` from THIS directory rsyncs your working copy
# into the workspace instead of pulling published recipes from the
# registry. Use this while you're editing backend/ or frontend/ code:
# saves you a `rig recipe app publish` between every change.
#
# Deploy from here:
#   cd frontend-plus-api/dev
#   rig workspace deploy --name my-stack
#
# Not publishable: `rig recipe composition publish` rejects apps[].path.
# For the publish flow, use ../composition.yaml (apps[].ref).

schemaVersion: 1
kind: workspace-definition

metadata:
  name: Frontend + API (local dev)
  summary: Local-iteration variant of frontend-plus-api — path-based children, no republish needed.
  description: |
    Same two apps as ../composition.yaml but child entries use `path:`
    instead of `ref:`. Every `rig workspace deploy` from this folder
    rsyncs ../backend and ../frontend into the VM and reruns each
    child's install + start. The composition itself is still
    auto-published as a `-local-<ts>` row for provenance.
  category: starter
  tags:
    - composition
    - starter
    - local-dev

# Same base + resources as the publishable variant — keep them in
# sync so a stack you debug in dev/ behaves the same when you flip
# back to the published refs.
base:
  image: "@rigbox/base@1"
  resources:
    ramMb: 1024
    vcpuCount: 1
    diskSizeMb: 3072

apps:
  - path: ../backend
    alias: api
  - path: ../frontend
    alias: web
    dependsOn:
      - api
