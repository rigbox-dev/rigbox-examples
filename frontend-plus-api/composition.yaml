schemaVersion: 1
kind: workspace-definition

identity:
  vendor: rigbox
  slug: frontend-plus-api
  version: 0.1.0

metadata:
  name: Frontend + API
  summary: Two-app starter — todo API plus a vanilla-JS frontend that talks to it.
  description: |
    A small two-app composition that spins up a workspace, installs
    a stateless todo API on one subdomain, and a static frontend on
    another. The frontend derives the API URL from its own hostname,
    so no per-deploy templating is needed.
  category: starter
  tags:
    - composition
    - starter

# Base image only — neither app needs anything pre-baked. Apt-installs
# Node at install time in each app's `install:` step.
base:
  image: "@rigbox/base@1"
  resources:
    ramMb: 1024
    vcpuCount: 1
    diskSizeMb: 3072

apps:
  - ref: "@rigbox/fpa-api@0.1.0"
    alias: api
  - ref: "@rigbox/fpa-web@0.1.0"
    alias: web
    dependsOn:
      - api
    params:
      # The frontend's `api_url` is overridable here if you want to
      # point it somewhere other than its sibling — most users leave
      # this empty and let the JS derive the URL from window.location.
      api_url: ""
