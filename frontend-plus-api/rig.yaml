# Frontend + API — a two-app project.
#
# `rig deploy` spins up (or attaches to) a workspace, rsyncs each app's
# code from its `path`, installs, and brings them up in dependency order.
# Both apps run as processes on the same workspace VM.
#
# Because frontend-web declares `dependsOn: [frontend-api]`, Rigbox injects
# RIGBOX_FRONTEND_API_URL=http://127.0.0.1:5100 into frontend-web's env.
# server.js proxies /api to that URL over loopback, so the browser stays
# same-origin and frontend-api never needs a public subdomain — it stays
# private (the default). Only frontend-web is opened to the world, via its
# `visibility: public` below. (Visibility is declared here, so a redeploy
# keeps it — it isn't a one-off `rig app share` that the next deploy resets.)
# Private apps sit behind a per-request auth check at the gateway; public
# ones skip it, so the page and its loopback /api calls stay fast.
#
# The page has a Private/Internet route toggle: "Internet" makes server.js
# call frontend-api's *public* subdomain instead, authenticated with the
# optional RIGBOX_API_KEY secret (see frontend-web.secrets below).
#
#   cd frontend-plus-api && rig deploy
#
# Redeploy just one app:  rig deploy --app frontend-web

workspace:
  image: base
  resources:
    ramMb: 1024
    vcpuCount: 1
    diskSizeMb: 3072

apps:
  frontend-api:
    path: ./backend
    port: 5100
    start: node app.js
    install: command -v node >/dev/null || sudo apt-get install -y nodejs
    health:
      path: /healthz
      timeoutSeconds: 30
    params:
      - key: enable_metrics
        type: boolean
        label: Expose Prometheus metrics
        description: When true, /metrics returns a single todos_total gauge.
        group: Observability
        default: "false"
        envVar: ENABLE_METRICS

  frontend-web:
    path: ./frontend
    port: 5101
    start: node server.js
    install: command -v node >/dev/null || sudo apt-get install -y nodejs
    dependsOn: [frontend-api]
    # The public front door. Omit this (or set `private`) and the gateway
    # auth-gates every request. For a privileged allow-list instead, use:
    #   visibility:
    #     emails: [you@example.com]
    visibility: public
    health:
      path: /healthz
      timeoutSeconds: 30
    # Optional: powers the page's "Internet" route toggle. Export a Rigbox
    # API key (ideally workspace-scoped) before `rig deploy` and server.js
    # will authenticate the public-subdomain call with X-Rigbox-Key. Omit it
    # and the deploy still succeeds — the toggle just shows how to enable it.
    #   export RIGBOX_API_KEY=rb_...
    secrets:
      - { name: RIGBOX_API_KEY, optional: true }
