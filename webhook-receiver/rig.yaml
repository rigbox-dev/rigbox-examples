name: webhook-receiver
port: 8080
install: |
  pip install --break-system-packages flask
start: python3 app.py
health:
  path: /healthz
  timeoutSeconds: 30
params:
  - key: signing_algorithm
    type: select
    label: Signing algorithm
    description: HMAC digest used to validate the X-Signature header.
    group: Signing
    default: sha256
    envVar: SIGNING_ALGORITHM
    options:
      - { value: sha256, label: "SHA-256" }
      - { value: sha1,   label: "SHA-1" }
      - { value: sha512, label: "SHA-512" }
secrets:
  - name: WEBHOOK_HMAC_KEY
credentials:
  endpoint_token:
    generate: true   # → injected as CRED_ENDPOINT_TOKEN
