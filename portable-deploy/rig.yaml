# portable-deploy — deploy from a git source (`source.kind: git`).
#
# `rig deploy` (run from a checkout of this directory) spawns/attaches a
# workspace, then the VM `git clone`s the repo below at install time. No
# local source is rsynced up — the operator can deploy from anywhere (a
# CI runner, a one-line README) without keeping the app code around.
#
# This rig.yaml lives inside `rigbox-dev/rigbox-examples` but reuses
# `sample-node-app`'s code. The install script does a small reshuffle
# after clone so `app.js` lands at the app's working directory.

name: portable-deploy
port: 5005
start: node app.js
install: |
  set -e
  # `source` below clones the whole rigbox-examples repo into the app's
  # working directory. Promote sample-node-app's contents up to the root
  # so `start` (which runs at the working dir) finds app.js + public/.
  if [ -d sample-node-app ]; then
    cp -r sample-node-app/. .
    rm -rf sample-node-app
  fi
  command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5005"
  NODE_ENV: production
  APP_NAME: "Portable Deploy"

health:
  path: /healthz
  timeoutSeconds: 60

source:
  kind: git
  repo: https://github.com/rigbox-dev/rigbox-examples.git
