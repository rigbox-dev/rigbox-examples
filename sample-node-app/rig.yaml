# sample-node-app — the smallest valid rig.yaml.
#
# Single-app project: the app's fields live at the top level. `rig deploy`
# spawns (or attaches to) a workspace, rsyncs this directory, runs `install`,
# then brings the app up under systemd and waits for the health check.
#
#   cd sample-node-app && rig deploy
#
# An optional `workspace:` block can pin the VM template (`image:`, a
# template NAME like `base`) and resources; omitted here so the deploy
# uses the account default.

name: node-app
port: 5000
start: node app.js
install: command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  # The top-level `port:` above wires the proxy/subdomain routing, but it
  # is NOT auto-exported into the app's process env. app.js reads
  # process.env.PORT, so declare it here (keep it in sync with `port:`).
  PORT: "5000"
  NODE_ENV: production
  APP_NAME: "NODE APP"

health:
  path: /healthz
  timeoutSeconds: 60
