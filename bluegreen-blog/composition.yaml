# bluegreen-blog — a two-app composition that walks through bluegreen
# + promote against a real-shape stateful app. The story this example
# tells is "I want to redesign my UI without risking my prod posts":
# you deploy v1, write content, redesign as a bluegreen sibling, see
# the new UI on real data, then atomically promote.
#
# Apps:
#   migrator/ — one-shot schema sidecar. Creates the data directory
#               + index file the blog reads. dependsOn'd by blog so
#               the blog NEVER starts on an uninitialized state.
#   blog/     — vanilla-JS markdown blog. Reads/writes posts as files
#               under /home/developer/data/posts/, which is OUTSIDE
#               the rsync zone, so data survives every redeploy.
#
# Deploy from this directory:
#   rig workspace deploy --name my-blog

base:
  image: "@rigbox/base@1"
  resources:
    ramMb: 1024
    vcpuCount: 1
    diskSizeMb: 3072

apps:
  - path: ./migrator
    alias: migrator
  - path: ./blog
    alias: blog
    dependsOn:
      - migrator
