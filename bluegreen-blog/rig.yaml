# bluegreen-blog — a Sinatra markdown blog that walks through bluegreen +
# promote against a REAL stateful app, and selects its theme with a
# server-validated `select` param (not a raw env var).
#
#   cd bluegreen-blog && rig deploy
#
# Ruby isn't in the base image (Python/Node are), so install apt-installs a
# lean Ruby + pure-Ruby gems — fast enough to stay well under the deploy cap.
# Posts live in a JSON file under DATA_DIR (outside the rsync zone), so content
# survives every redeploy and every bluegreen cut-over.

workspace:
  image: base
  resources: { ramMb: 1024, vcpuCount: 1, diskSizeMb: 3072 }

apps:
  blog:
    path: ./app
    port: 5100
    visibility: public
    install: |
      set -e
      sudo apt-get update -y
      sudo apt-get install -y --no-install-recommends ruby
      # All pure-Ruby gems → no native builds, no compiler/headers needed.
      sudo gem install --no-document sinatra kramdown rackup webrick
    start: ruby app.rb
    health:
      path: /healthz
      timeoutSeconds: 90
    env:
      DATA_DIR: /home/developer/data
    params:
      # The whole point: theme is a validated `select`, not a raw env var.
      # `rig app param set build_flavor=aurora` is accepted; `=bogus` is
      # rejected server-side before it ever reaches the app.
      - key: build_flavor
        type: select
        label: Theme
        description: Visual theme for the blog. Switches the accent color.
        group: Display
        default: classic
        envVar: BUILD_FLAVOR
        options:
          - { value: classic, label: "Classic" }
          - { value: aurora,  label: "Aurora" }
