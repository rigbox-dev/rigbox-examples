# param-showcase — exercises every v1 ParamSpec type and attribute.
#
# The eight `type:` values supported by the v1 manifest schema are
# string, number, boolean, secret, select, email, url, textarea.
# Each param below sets a non-default value for at least one of:
# default, required, sensitive, group, helpUrl, options, order,
# validationPattern — so you can read the full surface here as one page.

name: param-showcase
port: 5500
start: node app.js
install: command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5500"

health:
  path: /healthz
  timeoutSeconds: 30

params:
  # 1) string with a regex validator
  - key: greeting
    type: string
    label: Greeting prefix
    description: Prepended to every response on /params
    group: General
    order: 1
    default: hello
    required: true
    validationPattern: '^[a-z]{2,16}$'
    envVar: GREETING

  # 2) number with a default
  - key: max_items
    type: number
    label: Max items per page
    description: Upper bound on /list pagination
    group: General
    order: 2
    default: "25"
    envVar: MAX_ITEMS

  # 3) boolean
  - key: enable_metrics
    type: boolean
    label: Expose Prometheus metrics
    description: Toggles /metrics endpoint
    group: General
    order: 3
    default: "false"
    envVar: ENABLE_METRICS

  # 4) secret with a strong-format regex
  - key: api_secret
    type: secret
    label: Backend API secret
    description: User-supplied secret consumed by /params output as `***`
    group: Credentials
    sensitive: true
    validationPattern: '^[A-Za-z0-9_-]{12,64}$'
    envVar: API_SECRET

  # 5) select with rich options
  - key: log_level
    type: select
    label: Log level
    description: Controls verbosity inside the app
    group: General
    order: 4
    default: info
    options:
      - { value: debug, label: Debug }
      - { value: info,  label: Info }
      - { value: warn,  label: Warning }
      - { value: error, label: Error }
    envVar: LOG_LEVEL

  # 6) email
  - key: contact_email
    type: email
    label: Owner contact
    description: Surface in app footer for support
    group: Branding
    helpUrl: https://docs.example.com/contact
    default: ops@example.com
    envVar: CONTACT_EMAIL

  # 7) url
  - key: dashboard_url
    type: url
    label: Upstream dashboard
    description: Linked from app header
    group: Branding
    default: https://example.com/dashboard
    envVar: DASHBOARD_URL

  # 8) textarea
  - key: welcome_message
    type: textarea
    label: Welcome message
    description: Markdown-friendly blob shown on /params
    group: Branding
    order: 9
    default: |
      Welcome to param-showcase! Edit me via:
        rig app param set --app param-showcase welcome_message='your text'
    envVar: WELCOME_MESSAGE

# Server-generated tokens (NOT user-supplied) belong here, not in
# params. The CLI's `rig app param set` won't touch this — credentials
# are minted server-side at install.
# credentials:
#   session_secret:
#     generate: true

recipe:
  vendor: jonathan
  slug: param-showcase
  version: 0.2.0
  summary: Exercises every v1 ParamSpec type.
  description: |
    A tiny HTTP server that surfaces every configurable param at
    /params. Useful for testing `rig app param set/get/ls/unset`
    and for verifying that re-deploying from rig.yaml reverts
    in-flight CLI mutations.
  category: utility
  tags:
    - utility
