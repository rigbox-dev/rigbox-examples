# local-deploy-stack — uses `rig workspace deploy` against a local
# composition. Sibling of `frontend-plus-api/` which demonstrates
# the publishable composition flow. Both examples ship the same two
# apps (a todo API + a static frontend); they differ in *how* the
# composition gets deployed.
#
# Deploy from this directory:
#   rig workspace deploy --name my-stack
#
# That creates a base workspace (1 GB RAM, 1 vCPU, 3 GB disk) and
# rsyncs each `apps[].path` subdirectory into the VM, then runs each
# child's install + start. No publishing required.

base:
  image: "@rigbox/base@1"
  resources:
    ramMb: 1024
    vcpuCount: 1
    diskSizeMb: 3072

apps:
  - path: ./backend
    alias: api
  - path: ./frontend
    alias: web
    dependsOn:
      - api
