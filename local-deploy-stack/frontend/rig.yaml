# Frontend of the local-deploy-stack composition. Static todo UI
# served by a tiny node http server on port 5101. The frontend
# derives the API URL from its own hostname (see public/index.html
# `deriveApiUrl()`), so no per-deploy templating is needed.

name: fpa-web
port: 5101
start: node server.js

install: command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5101"

health:
  path: /healthz
  timeoutSeconds: 30
