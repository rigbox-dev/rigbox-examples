# Backend of the local-deploy-stack composition. Same in-memory todo
# API as frontend-plus-api/backend, but published-recipe metadata and
# the install-time git-clone reshuffle are gone — `rig workspace
# deploy` rsyncs this directory's contents directly into the VM, so
# app.js lands at the working dir root with no extra shuffling.

name: fpa-api
port: 5100
start: node app.js

# Simple — just ensure node exists. Rsync put app.js in place.
install: command -v node >/dev/null || sudo apt-get install -y nodejs

env:
  PORT: "5100"

health:
  path: /healthz
  timeoutSeconds: 30
